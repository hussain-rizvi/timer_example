# Board-specific Kconfig for Xiao BLE nRF52840
# The board DTS already enables USB CDC ACM console via the new
# device_next stack (cdc_acm_serial.dtsi). Do NOT enable
# CONFIG_USB_DEVICE_STACK here — that's the OLD stack and will
# cause duplicate symbol errors.

CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
